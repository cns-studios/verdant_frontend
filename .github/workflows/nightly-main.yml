name: Nightly Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  linux-build:
    name: Build Linux Bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Tauri Linux Bundles
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: npm run tauri build -- --bundles deb,rpm,appimage

      - name: Build Arch Linux Package
        run: |
          set -eux
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).version")
          mkdir -p out/archpkg
          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n 1)
          cp "$APPIMAGE" out/archpkg/Verdant-Desktop.AppImage

          cat > out/archpkg/PKGBUILD <<'PKGEOF'
          pkgname=Verdant-Desktop-bin
          pkgver=__VERSION__
          pkgrel=1
          pkgdesc="Verdant desktop mail client"
          arch=('x86_64')
          url="https://github.com/cns-studios/Verdant-Desktop"
          license=('custom')
          depends=('gtk3' 'webkit2gtk-4.1')
          source=('Verdant-Desktop.AppImage')
          sha256sums=('SKIP')

          package() {
            install -Dm755 "$srcdir/Verdant-Desktop.AppImage" "$pkgdir/opt/verdant/Verdant-Desktop.AppImage"

            install -Dm755 /dev/stdin "$pkgdir/usr/bin/Verdant-Desktop" <<'LAUNCHER'
            #!/bin/sh
            exec /opt/verdant/Verdant-Desktop.AppImage "$@"
            LAUNCHER

            install -Dm644 /dev/stdin "$pkgdir/usr/share/applications/Verdant-Desktop.desktop" <<'DESKTOP'
            [Desktop Entry]
            Type=Application
            Name=Verdant
            Exec=Verdant-Desktop
            Terminal=false
            Categories=Network;Email;
            DESKTOP
          }
          PKGEOF

          sed -i "s/__VERSION__/${VERSION}/g" out/archpkg/PKGBUILD

          docker run --rm -v "$PWD/out/archpkg:/work" archlinux:latest bash -lc '
            set -eux
            pacman -Syu --noconfirm --needed base-devel
            useradd -m builder
            chown -R builder:builder /work
            su builder -c "cd /work && makepkg -f --noconfirm"
          '

      - name: Collect Linux Artifacts
        run: |
          mkdir -p out/linux
          cp src-tauri/target/release/bundle/deb/*.deb out/linux/ || true
          cp src-tauri/target/release/bundle/rpm/*.rpm out/linux/ || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage out/linux/ || true
          cp out/archpkg/*.pkg.tar.zst out/linux/ || true

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: out/linux/*
          if-no-files-found: error

  windows-build:
    name: Build Windows Bundle
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Tauri Windows Bundle
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: npm run tauri build -- --bundles nsis

      - name: Collect Windows Artifacts
        shell: bash
        run: |
          mkdir -p out/windows
          cp src-tauri/target/release/bundle/nsis/*.exe out/windows/ || true

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: out/windows/*
          if-no-files-found: error

  publish-nightly:
    name: Publish Nightly Prerelease
    runs-on: ubuntu-latest
    needs:
      - linux-build
      - windows-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Compute Nightly Metadata
        id: meta
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).version")
          TAG="nightly-v${VERSION}-${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Publish Prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Nightly v${{ steps.meta.outputs.version }} (#${{ github.run_number }})
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.AppImage
            release-assets/*.pkg.tar.zst
            release-assets/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
